<style>
  :root {
    --primary: #f57c00;
    --bg: #121212;
    --card: #1e1e1e;
    --text: #ffffff;
  }

  body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    box-sizing: border-box;
  }

  .card {
    background: var(--card);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
  }

  h2 { color: var(--primary); margin-bottom: 25px; font-size: 28px; }
  
  input, select {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #333;
    background: #2c2c2c;
    color: white;
    font-size: 16px;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #f57c00, #ff9800);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s;
  }

  button:active { transform: scale(0.98); }

  .secondary-btn {
    background: transparent;
    border: 1px solid var(--primary);
    color: var(--primary);
    margin-top: 10px;
  }

  #corridas div {
    background: #2c2c2c;
    padding: 15px;
    border-radius: 12px;
    margin: 10px 0;
    text-align: left;
    border-left: 4px solid var(--primary);
  }
</style>

</head>
<body>

<div class="container">
    <div class="card">
      <h2>TNP MoB 🚗</h2>

      <div id="login">
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha (6+ dígitos)">
        
        <select id="tipo">
          <option value="passageiro">Sou Passageiro</option>
          <option value="motorista">Sou Motorista</option>
        </select>

        <button onclick="logar()">Entrar</button>
        <button class="secondary-btn" onclick="cadastrar()">Criar Nova Conta</button>
      </div>

      <div id="app" style="display:none;">
        <p>Olá, você é: <strong id="tipoUser" style="color:var(--primary)"></strong></p>

        <div id="passageiro" style="display:none;">
          <input id="origem" placeholder="📍 Onde você está?">
          <input id="destino" placeholder="🏁 Para onde vamos?">
          <button onclick="criarCorrida()">Chamar Carona Agora</button>
        </div>

        <div id="motorista" style="display:none;">
          <button onclick="ficarOnline()">Ficar Disponível Online</button>
          <hr style="border: 0.5px solid #333; margin: 20px 0;">
          <h4>Chamadas Próximas:</h4>
          <div id="corridas"></div>
        </div>
        
        <button class="secondary-btn" style="border-color: #666; color: #999;" onclick="location.reload()">Sair</button>
      </div>
    </div>
  </div>

<script>

// CADASTRO
function cadastrar() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const tipo = document.getElementById("tipo").value;

  auth.createUserWithEmailAndPassword(email, senha)
    .then((userCredential) => {
      const user = userCredential.user;

      return db.collection("usuarios").doc(user.uid).set({
        email,
        tipo
      });
    })
    .then(() => alert("Cadastrado!"))
    .catch(e => alert(e.message));
}

// LOGIN
function logar() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
    .catch(e => alert(e.message));
}

// SESSÃO
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    db.collection("usuarios").doc(user.uid).get().then(doc => {
      const tipo = doc.data().tipo;

      document.getElementById("tipoUser").innerText = tipo;

      if (tipo === "passageiro") {
        document.getElementById("passageiro").style.display = "block";
      }

      if (tipo === "motorista") {
        document.getElementById("motorista").style.display = "block";
        ouvirCorridas();
      }
    });
  }
});

// CRIAR CORRIDA
function criarCorrida() {
  const origem = document.getElementById("origem").value;
  const destino = document.getElementById("destino").value;
  const user = auth.currentUser;

  db.collection("corridas").add({
    passageiroId: user.uid,
    origem,
    destino,
    status: "procurando",
    motoristaId: null
  });

  alert("Corrida criada!");
}

// MOTORISTA ONLINE
function ficarOnline() {
  const user = auth.currentUser;

  db.collection("motoristas").doc(user.uid).set({
    online: true
  }, { merge: true });

  alert("Você está online!");
}

// OUVIR CORRIDAS
function ouvirCorridas() {
  db.collection("corridas")
    .where("status", "==", "procurando")
    .onSnapshot(snapshot => {
      const div = document.getElementById("corridas");
      div.innerHTML = "";

      snapshot.forEach(doc => {
        const corrida = doc.data();

        div.innerHTML += `
          <div style="border:1px solid white; margin:5px;">
            <p>${corrida.origem} → ${corrida.destino}</p>
            <button onclick="aceitarCorrida('${doc.id}')">Aceitar</button>
          </div>
        `;
      });
    });
}

// ACEITAR CORRIDA
function aceitarCorrida(id) {
  const user = auth.currentUser;

  db.collection("corridas").doc(id).update({
    status: "aceita",
    motoristaId: user.uid
  });

  alert("Corrida aceita!");
}

</script>

</body>
</html>
