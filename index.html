<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNP MoB 🚗</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
    :root {
        --tnp-dark: #121212;      /* Fundo principal */
        --tnp-card: #1e1b19;      /* Fundo dos cards (marrom café) */
        --tnp-gold: #c5a98d;      /* Dourado/Bege dos botões */
        --tnp-text: #e0e0e0;      /* Texto claro */
        --tnp-muted: #8e8e8e;     /* Texto secundário */
        --tnp-input: #2a2623;     /* Fundo dos campos */
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--tnp-dark);
        color: var(--tnp-text);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
    }

    .card {
        background: var(--tnp-card);
        padding: 30px 25px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        text-align: center;
        border: 1px solid rgba(255,255,255,0.03);
    }

    h2 { 
        color: var(--tnp-gold); 
        margin-bottom: 30px; 
        font-size: 24px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    
    input, select {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #3a3531;
        background: var(--tnp-input);
        color: white;
        font-size: 15px;
        box-sizing: border-box;
        outline: none;
    }

    input:focus {
        border-color: var(--tnp-gold);
    }

    button {
        width: 100%;
        padding: 15px;
        margin-top: 20px;
        border-radius: 8px;
        border: none;
        background: var(--tnp-gold);
        color: #1e1b19;
        font-size: 15px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    button:hover {
        opacity: 0.9;
    }

    .secondary-btn {
        background: transparent;
        border: 1px solid #3a3531;
        color: var(--tnp-gold);
        margin-top: 12px;
    }

    /* Estilo das corridas para parecer a lista de "Última Atividade" do print */
    #corridas div {
        background: #25211e;
        padding: 15px;
        border-radius: 8px;
        margin: 12px 0;
        text-align: left;
        border-bottom: 2px solid var(--tnp-gold);
    }

    #corridas p {
        margin: 4px 0;
        font-size: 14px;
    }

    #tipoUser {
        color: var(--tnp-gold);
        background: rgba(197, 169, 141, 0.1);
        padding: 2px 8px;
        border-radius: 4px;
    }

    hr {
        border: 0;
        border-top: 1px solid #3a3531;
        margin: 25px 0;
    }
</style>

    <script>
        // Suas chaves reais do TNP MoB
        const firebaseConfig = {
            apiKey: "AIzaSyAN13M1GGwYmyQA4131HB23CGX1SLWmlsQ",
            authDomain: "tnp-mob.firebaseapp.com",
            projectId: "tnp-mob",
            storageBucket: "tnp-mob.firebasestorage.app",
            messagingSenderId: "775995955512",
            appId: "1:775995955512:web:07d865e4480e0bf33909cd"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
    </script>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>TNP MoB 🚗</h2>

        <div id="login">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha (6+ dígitos)">
            
            <select id="tipo">
                <option value="passageiro">Sou Passageiro</option>
                <option value="motorista">Sou Motorista</option>
            </select>

            <button onclick="logar()">Entrar</button>
            <button class="secondary-btn" onclick="cadastrar()">Criar Nova Conta</button>
        </div>

        <div id="app" style="display:none;">
            <p>Olá, você é: <strong id="tipoUser" style="color:var(--primary)"></strong></p>

            <div id="passageiro" style="display:none;">
                <input id="origem" placeholder="📍 Onde você está?">
                <input id="destino" placeholder="🏁 Para onde vamos?">
                <button onclick="criarCorrida()">Chamar Carona Agora</button>
            </div>

            <div id="motorista" style="display:none;">
                <button onclick="ficarOnline()">Ficar Disponível Online</button>
                <hr style="border: 0.5px solid #333; margin: 20px 0;">
                <h4 style="margin: 0;">Chamadas Próximas:</h4>
                <div id="corridas"></div>
            </div>
            
            <button class="secondary-btn" style="border-color: #666; color: #999; margin-top: 30px;" onclick="location.reload()">Sair</button>
        </div>
    </div>
</div>

<script>
// CADASTRO
function cadastrar() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    const tipo = document.getElementById("tipo").value;

    auth.createUserWithEmailAndPassword(email, senha)
    .then((userCredential) => {
        const user = userCredential.user;
        return db.collection("usuarios").doc(user.uid).set({ email, tipo });
    })
    .then(() => alert("Conta criada com sucesso!"))
    .catch(e => alert(e.message));
}

// LOGIN
function logar() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;
    auth.signInWithEmailAndPassword(email, senha).catch(e => alert(e.message));
}

// SESSÃO (IDENTIFICA QUEM LOGOU)
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";

        db.collection("usuarios").doc(user.uid).get().then(doc => {
            const tipo = doc.data().tipo;
            document.getElementById("tipoUser").innerText = tipo.toUpperCase();

            if (tipo === "passageiro") {
                document.getElementById("passageiro").style.display = "block";
            } else if (tipo === "motorista") {
                document.getElementById("motorista").style.display = "block";
                ouvirCorridas();
            }
        });
    }
});

// PASSAGEIRO: CRIAR CORRIDA
function criarCorrida() {
    const origem = document.getElementById("origem").value;
    const destino = document.getElementById("destino").value;
    const user = auth.currentUser;

    if(!origem || !destino) return alert("Preencha origem e destino!");

    db.collection("corridas").add({
        passageiroId: user.uid,
        origem,
        destino,
        status: "procurando",
        motoristaId: null,
        data: new Date()
    }).then(() => alert("Procurando motoristas..."));
}

// MOTORISTA: ONLINE
function ficarOnline() {
    const user = auth.currentUser;
    db.collection("motoristas").doc(user.uid).set({ online: true }, { merge: true });
    alert("Você está online e visível!");
}

// MOTORISTA: OUVIR CHAMADAS
function ouvirCorridas() {
    db.collection("corridas")
    .where("status", "==", "procurando")
    .onSnapshot(snapshot => {
        const div = document.getElementById("corridas");
        div.innerHTML = "";
        if(snapshot.empty) div.innerHTML = "<p style='color:#666; font-size:14px;'>Nenhuma chamada no momento...</p>";

        snapshot.forEach(doc => {
            const corrida = doc.data();
            div.innerHTML += `
                <div>
                    <p style="margin:0; font-size:14px;"><strong>De:</strong> ${corrida.origem}</p>
                    <p style="margin:5px 0; font-size:14px;"><strong>Para:</strong> ${corrida.destino}</p>
                    <button onclick="aceitarCorrida('${doc.id}')">ACEITAR CORRIDA</button>
                </div>
            `;
        });
    });
}

// MOTORISTA: ACEITAR
function aceitarCorrida(id) {
    const user = auth.currentUser;
    db.collection("corridas").doc(id).update({
        status: "aceita",
        motoristaId: user.uid
    }).then(() => alert("Corrida aceita! Vá ao encontro do passageiro."));
}
</script>

</body>
</html>
