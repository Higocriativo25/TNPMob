<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - TNP MoB</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --Fame_dark: #121212;
            --Fame_card: #1e1b19;
            --Fame_gold: #c5a98d;
            --Fame_text: #e0e0e0;
            --Fame_brown: #4d2b1a;
            --Success: #28a745;
            --Danger: #dc3545;
            --Warning: #ffc107;
        }

        body {
            background-color: #000;
            color: var(--Fame_text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 600px; padding: 20px; }

        .card_motorista {
            background: var(--Fame_card);
            border: 1px solid var(--Fame_brown);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .card_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .status_tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
            color: #000;
        }

        .info_group { margin-bottom: 8px; font-size: 0.9rem; }
        .label { color: var(--Fame_gold); font-weight: bold; }

        .btn_group { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn_aprovar { background: var(--Success); color: white; }
        .btn_recusar { background: var(--Danger); color: white; }
        .btn_doc { background: #2a2623; color: var(--Fame_gold); border: 1px solid var(--Fame_gold); }

        #Login_Area { text-align: center; margin-top: 100px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2623;
            border: 1px solid var(--Fame_brown);
            color: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">

    <div id="Login_Area">
        <h1 style="color: var(--Fame_gold);">🔐 Admin TNP MoB</h1>
        <input type="email" id="adm_email" placeholder="E-mail">
        <input type="password" id="adm_senha" placeholder="Senha">
        <button class="btn btn_aprovar" onclick="logarAdmin()">ACESSAR PAINEL</button>
    </div>

    <div id="Admin_Dashboard" style="display: none;">
        <div style="display:flex;justify-content:space-between;">
            <h2 style="color: var(--Fame_gold);">Motoristas</h2>
            <button onclick="auth.signOut()" style="background:none;border:none;color:red;">Sair</button>
        </div>

        <div id="lista_motoristas">Carregando...</div>
    </div>

</div>

<script>
const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "tnp-mob.firebaseapp.com",
    projectId: "tnp-mob"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();
const ADMIN_UID = "OoRgSNe5gChgvFFJvL3m812NgC22";

function logarAdmin() {
    const email = document.getElementById('adm_email').value;
    const senha = document.getElementById('adm_senha').value;
    auth.signInWithEmailAndPassword(email, senha)
        .catch(e => alert("Erro: " + e.message));
}

auth.onAuthStateChanged(user => {
    if (user && user.uid === ADMIN_UID) {
        Login_Area.style.display = 'none';
        Admin_Dashboard.style.display = 'block';
        carregarMotoristas();
    } else {
        Login_Area.style.display = 'block';
        Admin_Dashboard.style.display = 'none';
    }
});

function carregarMotoristas() {
    const listaDiv = document.getElementById('lista_motoristas');

    db.collection("motoristas").onSnapshot(snapshot => {
        listaDiv.innerHTML = "";

        snapshot.forEach(doc => {
            const m = doc.data();
            const id = doc.id;

            const nome = m.nome || m.cnh?.nome || "Sem nome";
            const telefone = m.telefonePrincipal || "Não informado";
            const veiculo = m.veiculo 
                ? `${m.veiculo.modelo} (${m.veiculo.placa})` 
                : "Sem veículo";

            const documento = m.identidade?.cpf || m.identidade?.cnpj || "N/A";
            const idTnp = m.idTnp || "N/A";

            const status = m.status?.geral || "pendente";

            const cor =
                status === 'aprovado' ? 'var(--Success)' :
                status === 'recusado' ? 'var(--Danger)' :
                'var(--Warning)';

            listaDiv.innerHTML += `
                <div class="card_motorista">
                    <div class="card_header">
                        <strong>${nome}</strong>
                        <span class="status_tag" style="background:${cor}">${status}</span>
                    </div>

                    <div class="info_group"><span class="label">ID TNP:</span> ${idTnp}</div>
                    <div class="info_group"><span class="label">Telefone:</span> ${telefone}</div>
                    <div class="info_group"><span class="label">Documento:</span> ${documento}</div>
                    <div class="info_group"><span class="label">Veículo:</span> ${veiculo}</div>
                    <div class="info_group"><span class="label">Email:</span> ${m.email || 'N/A'}</div>

                    <div class="btn_group">
                        <button class="btn btn_doc" onclick="alert('Uploads ainda não ativados')">
                            VER DOCS
                        </button>
                        <button class="btn btn_aprovar" onclick="mudarStatus('${id}','aprovado')">
                            APROVAR
                        </button>
                        <button class="btn btn_recusar" onclick="mudarStatus('${id}','recusado')">
                            RECUSAR
                        </button>
                    </div>
                </div>
            `;
        });

        if (snapshot.empty) {
            listaDiv.innerHTML = "Nenhum motorista encontrado.";
        }
    });
}

function mudarStatus(id, novo) {
    db.collection("motoristas").doc(id).update({
        "status.geral": novo,
        "status.atualizadoEm": new Date()
    })
    .catch(e => alert("Erro: " + e.message));
}
</script>

</body>
</html>
