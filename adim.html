<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin Completo - TNP MoB</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --Fame_dark: #121212;
            --Fame_card: #1e1b19;
            --Fame_gold: #c5a98d;
            --Fame_text: #e0e0e0;
            --Fame_brown: #4d2b1a;
            --Success: #28a745;
            --Danger: #dc3545;
            --Warning: #ffc107;
            --Info: #17a2b8;
        }

        body {
            background-color: #000;
            color: var(--Fame_text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 1000px; padding: 20px; }

        .card_motorista {
            background: var(--Fame_card);
            border: 1px solid var(--Fame_brown);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .status_tag {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
            color: #000;
        }

        .info_section {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .section_title {
            display: block;
            color: var(--Fame_gold);
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(197, 169, 141, 0.2);
            padding-bottom: 3px;
        }

        .info_grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .info_group { font-size: 0.85rem; line-height: 1.4; }
        .label { color: var(--Fame_gold); font-weight: bold; margin-right: 5px; opacity: 0.8; }

        .btn_group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn {
            flex: 1; min-width: 120px; padding: 12px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.85rem;
        }
        .btn_aprovar { background: var(--Success); color: white; }
        .btn_recusar { background: var(--Danger); color: white; }
        .btn_doc { background: #2a2623; color: var(--Fame_gold); border: 1px solid var(--Fame_gold); }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        #Login_Area { text-align: center; margin-top: 100px; max-width: 400px; margin-left: auto; margin-right: auto; }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            background: #2a2623; border: 1px solid var(--Fame_brown); 
            color: white; border-radius: 8px; box-sizing: border-box;
        }

        .search_container {
            background: var(--Fame_card);
            border: 1px solid var(--Fame_brown);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .search_title { color: var(--Fame_gold); font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; }
        .search_inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .search_inputs input { margin: 0; }
        .search_buttons { display: flex; gap: 10px; }
        .btn_buscar { flex: 2; background: var(--Fame_gold); color: #000; font-weight: bold; padding: 12px; border: none; border-radius: 8px; cursor: pointer; }
        .btn_limpar { flex: 1; background: #2a2623; color: var(--Fame_gold); border: 1px solid var(--Fame_gold); padding: 12px; border-radius: 8px; cursor: pointer; }

        .header_dashboard { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn_sair { background: none; border: none; color: #dc3545; cursor: pointer; font-weight: bold; font-size: 1rem; }
        
        @media (max-width: 600px) {
            .search_inputs { grid-template-columns: 1fr; }
            .info_grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="Login_Area">
        <h1 style="color: var(--Fame_gold);">🔐 Admin TNP MoB</h1>
        <input type="email" id="adm_email" placeholder="E-mail">
        <input type="password" id="adm_senha" placeholder="Senha">
        <button class="btn btn_aprovar" style="width: 100%;" onclick="logarAdmin()">ACESSAR PAINEL</button>
    </div>

    <div id="Admin_Dashboard" style="display: none;">
        <div class="header_dashboard">
            <h2 style="color: var(--Fame_gold); margin: 0;">Gestão de Cadastros</h2>
            <button class="btn_sair" onclick="auth.signOut()">Sair</button>
        </div>

        <div class="search_container">
            <div class="search_title">🔍 Buscar por Nome, CPF, CNPJ ou CNH</div>
            <div class="search_inputs">
                <input type="text" id="search_nome" placeholder="Nome do usuário/motorista">
                <input type="text" id="search_documento" placeholder="Documento (Apenas números)">
            </div>
            <div class="search_buttons">
                <button class="btn_buscar" onclick="executarBusca()">FILTRAR CADASTROS</button>
                <button class="btn_limpar" onclick="limparBusca()">LIMPAR</button>
            </div>
            <div id="search_results" style="margin-top:10px; font-size:0.8rem; color:var(--Fame_gold);"></div>
        </div>

        <div id="lista_cadastros">Carregando dados...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAN13M1GGwYmyQA4131HB23cGX1SLWmlsQ",
        authDomain: "tnp-mob.firebaseapp.com",
        projectId: "tnp-mob",
        storageBucket: "tnp-mob.firebasestorage.app",
        messagingSenderId: "775995955512",
        appId: "1:775995955512:web:07d865e4480e0bf33909cd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const ADMIN_UID = "OoRgSNe5gChgvFFJvL3m812NgC22";

    let todosOsCadastros = [];

    function logarAdmin() {
        const email = document.getElementById('adm_email').value;
        const senha = document.getElementById('adm_senha').value;
        auth.signInWithEmailAndPassword(email, senha).catch(e => alert("Erro: " + e.message));
    }

    auth.onAuthStateChanged(user => {
        if (user && user.uid === ADMIN_UID) {
            document.getElementById('Login_Area').style.display = 'none';
            document.getElementById('Admin_Dashboard').style.display = 'block';
            carregarDados();
        } else {
            document.getElementById('Login_Area').style.display = 'block';
            document.getElementById('Admin_Dashboard').style.display = 'none';
        }
    });

    function carregarDados() {
        const colecoes = ["motoristas", "usuarios"];
        todosOsCadastros = [];

        colecoes.forEach(colecao => {
            db.collection(colecao).onSnapshot(snapshot => {
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    const index = todosOsCadastros.findIndex(c => c.id === id);
                    const item = { ...data, id, colecao };
                    if (index >= 0) todosOsCadastros[index] = item;
                    else todosOsCadastros.push(item);
                });
                if (!document.getElementById('search_nome').value && !document.getElementById('search_documento').value) {
                    exibirCadastros(todosOsCadastros);
                }
            });
        });
    }

    function executarBusca() {
        const nome = document.getElementById('search_nome').value.toLowerCase().trim();
        const docBusca = document.getElementById('search_documento').value.replace(/\D/g, '');

        const filtrados = todosOsCadastros.filter(c => {
            const nomeMatch = (c.nome || c.cnh?.nome || "").toLowerCase().includes(nome);
            const docMatch = (c.identidade?.cpf || "").replace(/\D/g, "").includes(docBusca) || 
                             (c.identidade?.cnpj || "").replace(/\D/g, "").includes(docBusca) ||
                             (c.cnh?.numero || "").replace(/\D/g, "").includes(docBusca);
            return nomeMatch && (docBusca === "" || docMatch);
        });

        exibirCadastros(filtrados);
        document.getElementById('search_results').innerText = `Exibindo ${filtrados.length} de ${todosOsCadastros.length} cadastros.`;
    }

    function limparBusca() {
        document.getElementById('search_nome').value = "";
        document.getElementById('search_documento').value = "";
        document.getElementById('search_results').innerText = "";
        exibirCadastros(todosOsCadastros);
    }

    function formatarData(timestamp) {
        if (!timestamp) return "N/A";
        const date = timestamp.seconds ? new Date(timestamp.seconds * 1000) : new Date(timestamp);
        return date.toLocaleDateString('pt-BR') + " " + date.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
    }

    function exibirCadastros(lista) {
        const listaDiv = document.getElementById('lista_cadastros');
        listaDiv.innerHTML = "";

        lista.sort((a, b) => (b.criadoEm?.seconds || 0) - (a.criadoEm?.seconds || 0));

        lista.forEach(data => {
            const ehMotorista = data.tipo === 'motorista';
            const statusGeral = data.status?.geral || data.status || "pendente";
            const corStatus = statusGeral === 'aprovado' ? 'var(--Success)' : (statusGeral === 'recusado' ? 'var(--Danger)' : 'var(--Warning)');
            
            listaDiv.innerHTML += `
                <div class="card_motorista" style="border-left: 6px solid ${ehMotorista ? 'var(--Fame_brown)' : 'var(--Info)'}">
                    <div class="card_header">
                        <div>
                            <small style="color:var(--Fame_gold); font-size:0.7rem; font-weight:bold;">
                                ${data.colecao.toUpperCase()} | ID TNP: ${data.idTnp || 'N/A'}
                            </small>
                            <h3 style="margin:5px 0; color:white;">${data.nome || data.cnh?.nome || "SEM NOME"}</h3>
                            <small style="color:var(--Fame_muted);">Cadastrado em: ${formatarData(data.criadoEm)}</small>
                        </div>
                        <div style="text-align:right;">
                            <span class="status_tag" style="background: ${corStatus}">${statusGeral}</span>
                            <div style="font-size:0.6rem; margin-top:5px; color:var(--Fame_muted);">Atu: ${formatarData(data.status?.atualizadoEm)}</div>
                        </div>
                    </div>

                    <div class="info_section">
                        <span class="section_title">👤 Identificação e Contato</span>
                        <div class="info_grid">
                            <div class="info_group"><span class="label">E-mail:</span> ${data.email || 'N/A'}</div>
                            <div class="info_group"><span class="label">WhatsApp:</span> ${data.telefonePrincipal || 'N/A'}</div>
                            <div class="info_group"><span class="label">Tipo Doc:</span> ${data.identidade?.tipo?.toUpperCase() || 'N/A'}</div>
                            <div class="info_group"><span class="label">Doc:</span> ${data.identidade?.cpf || data.identidade?.cnpj || 'N/A'}</div>
                        </div>
                    </div>

                    <div class="info_section">
                        <span class="section_title">📍 Endereço</span>
                        <div class="info_group">
                            ${data.endereco?.rua || 'N/A'}, ${data.endereco?.numero || 'N/A'} ${data.endereco?.complemento ? '- ' + data.endereco.complemento : ''}<br>
                            ${data.endereco?.bairro || 'N/A'} - ${data.endereco?.cidade || 'N/A'}/${data.endereco?.estado || 'N/A'}<br>
                            <span class="label">CEP:</span> ${data.endereco?.cep || 'N/A'} | <span class="label">Ref:</span> ${data.endereco?.referencia || 'N/A'}
                        </div>
                    </div>

                    ${ehMotorista ? `
                    <div class="info_section" style="border-top: 1px dashed var(--Fame_brown); padding-top:15px;">
                        <span class="section_title">🚗 Dados do Veículo</span>
                        <div class="info_grid">
                            <div class="info_group"><span class="label">Modelo:</span> ${data.veiculo?.modelo || 'N/A'}</div>
                            <div class="info_group"><span class="label">Placa:</span> ${data.veiculo?.placa || 'N/A'}</div>
                            <div class="info_group"><span class="label">Ano:</span> ${data.veiculo?.ano || 'N/A'}</div>
                            <div class="info_group"><span class="label">Cor:</span> ${data.veiculo?.cor || 'N/A'}</div>
                            <div class="info_group"><span class="label">Renavam:</span> ${data.veiculo?.renavam || 'N/A'}</div>
                            <div class="info_group"><span class="label">Chassi:</span> ${data.veiculo?.chassi || 'N/A'}</div>
                        </div>
                    </div>

                    <div class="info_section">
                        <span class="section_title">🪪 Dados da CNH</span>
                        <div class="info_grid">
                            <div class="info_group"><span class="label">Nº Registro:</span> ${data.cnh?.numero || 'N/A'}</div>
                            <div class="info_group"><span class="label">Categoria:</span> ${data.cnh?.categoria || 'N/A'}</div>
                            <div class="info_group"><span class="label">Emissão:</span> ${data.cnh?.dataEmissao || 'N/A'}</div>
                            <div class="info_group"><span class="label">Nome CNH:</span> ${data.cnh?.nome || 'N/A'}</div>
                        </div>
                    </div>
                    ` : ''}

                    <div class="btn_group">
                        <button class="btn btn_doc" onclick="alert('Funcionalidade de fotos pendente de ativação no plano.')">VER DOCUMENTOS</button>
                        <button class="btn btn_aprovar" onclick="mudarStatus('${data.id}', 'aprovado', '${data.colecao}')">APROVAR</button>
                        <button class="btn btn_recusar" onclick="mudarStatus('${data.id}', 'recusado', '${data.colecao}')">RECUSAR</button>
                    </div>
                </div>
            `;
        });
    }

    function mudarStatus(id, novo, colecao) {
        if(!confirm(`Deseja realmente alterar o status para ${novo.toUpperCase()}?`)) return;
        
        db.collection(colecao).doc(id).update({
            status: novo,
            "status.geral": novo,
            "status.atualizadoEm": new Date()
        }).then(() => {
            alert("Status atualizado com sucesso!");
        }).catch(e => alert("Erro ao atualizar: " + e.message));
    }

    document.addEventListener('keypress', (e) => { if(e.key === 'Enter') executarBusca(); });
</script>

</body>
</html>
