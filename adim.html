<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - TNP MoB</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --Fame_dark: #121212;
            --Fame_card: #1e1b19;
            --Fame_gold: #c5a98d;
            --Fame_text: #e0e0e0;
            --Fame_brown: #4d2b1a;
            --Success: #28a745;
            --Danger: #dc3545;
            --Warning: #ffc107;
        }

        body {
            background-color: #000;
            color: var(--Fame_text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 900px; padding: 20px; }

        .card_motorista {
            background: var(--Fame_card);
            border: 1px solid var(--Fame_brown);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .status_tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
            color: #000;
        }

        .info_group { margin-bottom: 8px; font-size: 0.9rem; }
        .label { color: var(--Fame_gold); font-weight: bold; margin-right: 5px; }

        .btn_group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn {
            flex: 1; min-width: 100px; padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn_aprovar { background: var(--Success); color: white; }
        .btn_recusar { background: var(--Danger); color: white; }
        .btn_doc { background: #2a2623; color: var(--Fame_gold); border: 1px solid var(--Fame_gold); }
        .btn:hover { opacity: 0.8; }

        #Login_Area { text-align: center; margin-top: 100px; }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            background: #2a2623; border: 1px solid var(--Fame_brown); 
            color: white; border-radius: 8px; box-sizing: border-box;
        }

        /* Estilos para o campo de busca */
        .search_container {
            background: var(--Fame_card);
            border: 1px solid var(--Fame_brown);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .search_title {
            color: var(--Fame_gold);
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .search_inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .search_inputs input {
            margin: 0;
        }

        .search_buttons {
            display: flex;
            gap: 10px;
        }

        .btn_buscar {
            flex: 1;
            background: var(--Fame_gold);
            color: #000;
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn_buscar:hover {
            opacity: 0.8;
        }

        .btn_limpar {
            flex: 1;
            background: #2a2623;
            color: var(--Fame_gold);
            border: 1px solid var(--Fame_gold);
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn_limpar:hover {
            opacity: 0.8;
        }

        .search_results {
            color: var(--Fame_gold);
            font-size: 0.9rem;
            margin-top: 10px;
            font-style: italic;
        }

        .header_dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header_dashboard h2 {
            color: var(--Fame_gold);
            margin: 0;
        }

        .btn_sair {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn_sair:hover {
            opacity: 0.8;
        }

        .no_results {
            text-align: center;
            color: var(--Fame_gold);
            padding: 40px 20px;
            font-style: italic;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="Login_Area">
        <h1 style="color: var(--Fame_gold);">🔐 Admin TNP MoB</h1>
        <input type="email" id="adm_email" placeholder="E-mail">
        <input type="password" id="adm_senha" placeholder="Senha">
        <button class="btn btn_aprovar" style="width: 100%;" onclick="logarAdmin()">ACESSAR PAINEL</button>
    </div>

    <div id="Admin_Dashboard" style="display: none;">
        <div class="header_dashboard">
            <h2>Gerenciamento de Cadastros</h2>
            <button class="btn_sair" onclick="auth.signOut()">Sair</button>
        </div>

        <!-- CAMPO DE BUSCA -->
        <div class="search_container">
            <div class="search_title">🔍 Buscar Cadastro</div>
            
            <div class="search_inputs">
                <input type="text" id="search_nome" placeholder="Buscar por Nome">
                <input type="text" id="search_documento" placeholder="CPF, CNPJ ou CNH">
            </div>

            <div class="search_buttons">
                <button class="btn_buscar" onclick="executarBusca()">BUSCAR</button>
                <button class="btn_limpar" onclick="limparBusca()">LIMPAR</button>
            </div>

            <div class="search_results" id="search_results"></div>
        </div>

        <!-- LISTA DE CADASTROS -->
        <div id="lista_motoristas">Buscando dados...</div>
    </div>
</div>

<script>
    // Configuração Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAN13M1GGwYmyQA4131HB23cGX1SLWmlsQ",
        authDomain: "tnp-mob.firebaseapp.com",
        projectId: "tnp-mob",
        storageBucket: "tnp-mob.firebasestorage.app",
        messagingSenderId: "775995955512",
        appId: "1:775995955512:web:07d865e4480e0bf33909cd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const ADMIN_UID = "OoRgSNe5gChgvFFJvL3m812NgC22";

    // Variáveis globais para armazenar dados
    let todosOsCadastros = [];
    let cadastrosFiltrados = [];

    function logarAdmin() {
        const email = document.getElementById('adm_email').value;
        const senha = document.getElementById('adm_senha').value;
        auth.signInWithEmailAndPassword(email, senha).catch(e => alert("Erro: " + e.message));
    }

    auth.onAuthStateChanged(user => {
        const loginDiv = document.getElementById('Login_Area');
        const dashDiv = document.getElementById('Admin_Dashboard');
        
        if (user && user.uid === ADMIN_UID) {
            loginDiv.style.display = 'none';
            dashDiv.style.display = 'block';
            carregarCadastros();
        } else {
            loginDiv.style.display = 'block';
            dashDiv.style.display = 'none';
        }
    });

    // Carregar todos os cadastros
    function carregarCadastros() {
        const listaDiv = document.getElementById('lista_motoristas');
        const colecoes = ["motoristas", "usuarios"];
        todosOsCadastros = [];

        colecoes.forEach(colecao => {
            db.collection(colecao).onSnapshot(snapshot => {
                // Remove cadastros da coleção anterior
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    
                    // Armazena na array global
                    const indice = todosOsCadastros.findIndex(c => c.id === id);
                    if (indice >= 0) {
                        todosOsCadastros[indice] = { ...data, id, colecao };
                    } else {
                        todosOsCadastros.push({ ...data, id, colecao });
                    }
                });

                // Se não há busca ativa, exibe todos
                if (!document.getElementById('search_nome').value && !document.getElementById('search_documento').value) {
                    exibirCadastros(todosOsCadastros);
                }
            });
        });
    }

    // Função de busca
    function executarBusca() {
        const nome = document.getElementById('search_nome').value.toLowerCase().trim();
        const documento = document.getElementById('search_documento').value.trim();

        if (!nome && !documento) {
            alert('Digite pelo menos um critério de busca');
            return;
        }

        cadastrosFiltrados = todosOsCadastros.filter(cadastro => {
            let correspondenciaNome = true;
            let correspondenciaDocumento = true;

            // Busca por nome
            if (nome) {
                const nomeCompleto = (cadastro.nome || cadastro.cnh?.nome || '').toLowerCase();
                correspondenciaNome = nomeCompleto.includes(nome);
            }

            // Busca por documento (CPF, CNPJ ou CNH)
            if (documento) {
                const cpf = (cadastro.identidade?.cpf || '').replace(/\D/g, '');
                const cnpj = (cadastro.identidade?.cnpj || '').replace(/\D/g, '');
                const cnh = (cadastro.cnh?.numero || '').replace(/\D/g, '');
                const docLimpo = documento.replace(/\D/g, '');

                correspondenciaDocumento = cpf.includes(docLimpo) || cnpj.includes(docLimpo) || cnh.includes(docLimpo);
            }

            return correspondenciaNome && correspondenciaDocumento;
        });

        exibirCadastros(cadastrosFiltrados);
        
        const resultadoDiv = document.getElementById('search_results');
        resultadoDiv.textContent = `Encontrados ${cadastrosFiltrados.length} resultado(s)`;
    }

    // Limpar busca
    function limparBusca() {
        document.getElementById('search_nome').value = '';
        document.getElementById('search_documento').value = '';
        document.getElementById('search_results').textContent = '';
        exibirCadastros(todosOsCadastros);
    }

    // Exibir cadastros
    function exibirCadastros(cadastros) {
        const listaDiv = document.getElementById('lista_motoristas');
        listaDiv.innerHTML = '';

        if (cadastros.length === 0) {
            listaDiv.innerHTML = '<div class="no_results">Nenhum cadastro encontrado</div>';
            return;
        }

        cadastros.forEach(data => {
            const id = data.id;
            const colecao = data.colecao;
            const ehMotorista = data.tipo === 'motorista';

            const documento = data.identidade?.tipo === 'cpf' ? data.identidade?.cpf : data.identidade?.cnpj;
            const statusTxt = typeof data.status === 'string' ? data.status : (data.status?.geral || "pendente");
            const corStatus = statusTxt === 'aprovado' ? 'var(--Success)' : (statusTxt === 'recusado' ? 'var(--Danger)' : 'var(--Warning)');

            listaDiv.innerHTML += `
                <div class="card_motorista" style="border-left: 5px solid ${ehMotorista ? 'var(--Fame_brown)' : '#2a2623'}">
                    <div class="card_header">
                        <div>
                            <small style="color:var(--Fame_gold); font-size:0.7rem;">${colecao.toUpperCase()} | ${data.identidade?.tipo?.toUpperCase() || 'DOC'}</small>
                            <h3 style="margin:5px 0;">${data.nome || data.cnh?.nome || "Sem Nome"}</h3>
                        </div>
                        <span class="status_tag" style="background: ${corStatus}">${statusTxt}</span>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                        <div class="info_group"><span class="label">ID TNP:</span> ${data.idTnp || 'N/A'}</div>
                        <div class="info_group"><span class="label">Doc:</span> ${documento || 'N/A'}</div>
                        <div class="info_group"><span class="label">Zap:</span> ${data.telefonePrincipal || 'N/A'}</div>
                        <div class="info_group"><span class="label">Email:</span> <small>${data.email || 'N/A'}</small></div>
                    </div>

                    <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                        <span class="label" style="display:block; margin-bottom:5px; font-size:0.7rem;">📍 ENDEREÇO</span>
                        <div class="info_group" style="font-size:0.8rem;">
                            ${data.endereco?.rua || 'N/A'}, ${data.endereco?.numero || 'N/A'} - ${data.endereco?.bairro || 'N/A'}<br>
                            ${data.endereco?.cidade || 'N/A'}/${data.endereco?.estado || 'N/A'} - CEP: ${data.endereco?.cep || 'N/A'}
                        </div>
                    </div>

                    ${ehMotorista ? `
                        <div style="border-top: 1px solid #333; padding-top: 15px;">
                            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <div>
                                    <span class="label" style="font-size:0.7rem;">🚗 VEÍCULO</span>
                                    <div class="info_group">${data.veiculo?.modelo || 'N/A'} (${data.veiculo?.ano || 'N/A'})</div>
                                    <div class="info_group"><span class="label">Placa:</span> ${data.veiculo?.placa || 'N/A'}</div>
                                    <div class="info_group"><span class="label">Cor:</span> ${data.veiculo?.cor || 'N/A'}</div>
                                </div>
                                <div>
                                    <span class="label" style="font-size:0.7rem;">🪪 CNH (${data.cnh?.categoria || 'N/A'})</span>
                                    <div class="info_group">${data.cnh?.numero || 'N/A'}</div>
                                    <div class="info_group"><span class="label">Emissão:</span> ${data.cnh?.dataEmissao || 'N/A'}</div>
                                </div>
                            </div>
                        </div>
                    ` : ''}

                    <div class="btn_group">
                        <button class="btn btn_doc" onclick="verDocumentos('${id}', '${colecao}')">VER DOCS</button>
                        <button class="btn btn_aprovar" onclick="mudarStatus('${id}', 'aprovado', '${colecao}')">APROVAR</button>
                        <button class="btn btn_recusar" onclick="mudarStatus('${id}', 'recusado', '${colecao}')">RECUSAR</button>
                    </div>
                </div>
            `;
        });
    }

    // Mudar status
    function mudarStatus(id, novo, colecao) {
        db.collection(colecao).doc(id).update({
            status: novo,
            "status.geral": novo,
            "status.atualizadoEm": new Date()
        }).then(() => {
            alert(`Status atualizado para: ${novo}`);
        }).catch(e => alert("Erro: " + e.message));
    }

    // Ver documentos (placeholder)
    function verDocumentos(id, colecao) {
        alert(`Documentos do cadastro: ${id} (${colecao})`);
        // Aqui você pode implementar um modal ou página de visualização de documentos
    }

    // Permitir busca ao pressionar Enter
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('search_nome').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') executarBusca();
        });
        document.getElementById('search_documento').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') executarBusca();
        });
    });
</script>

</body>
</html>
