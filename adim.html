<!DOCTYPE html>
<html>
<head>
    <title>Login Admin</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        input { padding: 10px; margin: 5px; width: 250px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h2>🔐 Login Administrativo</h2>
    <input type="email" id="email" placeholder="Seu E-mail"><br>
    <input type="password" id="senha" placeholder="Sua Senha"><br>
    <button onclick="logar()">Entrar</button>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
    // ⚠️ ATENÇÃO: Use o bloco de configurações que você já tem no adim.html
    const firebaseConfig = {
        apiKey: "AIzaSyAN13M1GGwYmyQA4131HB23cGX1SLWmlsQ",
        authDomain: "tnp-mob.firebaseapp.com",
        projectId: "tnp-mob",
        storageBucket: "tnp-mob.firebasestorage.app",
        messagingSenderId: "775995955512",
        appId: "1:775995955512:web:07d865e4480e0bf33909cd"
    };

    firebase.initializeApp(firebaseConfig);

    function logar() {
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;

        // Tenta fazer o login
        firebase.auth().signInWithEmailAndPassword(email, senha)
            .then((userCredential) => {
                // Verifica se o UID de quem logou é o seu
                if (userCredential.user.uid === "OoRgSNe5gChgvFFJvL3m812NgC22") {
                    window.location.href = "adim.html"; // Redireciona para seu painel
                } else {
                    alert("Você não tem permissão de administrador!");
                    firebase.auth().signOut();
                }
            })
            .catch(erro => { 
                alert("Erro ao entrar: " + erro.message); 
            });
    }
</script>
</body>
</html>
