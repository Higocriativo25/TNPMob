<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - TNP MoB</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --Fame_dark: #121212;
            --Fame_card: #1e1b19;
            --Fame_gold: #c5a98d;
            --Fame_text: #e0e0e0;
            --Fame_brown: #4d2b1a;
            --Success: #28a745;
            --Danger: #dc3545;
            --Warning: #ffc107;
        }

        body {
            background-color: #000;
            color: var(--Fame_text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 600px; padding: 20px; }

        .card_motorista {
            background: var(--Fame_card);
            border: 1px solid var(--Fame_brown);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .status_tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
            color: #000;
        }

        .info_group { margin-bottom: 8px; font-size: 0.9rem; }
        .label { color: var(--Fame_gold); font-weight: bold; margin-right: 5px; }

        .btn_group { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn_aprovar { background: var(--Success); color: white; }
        .btn_recusar { background: var(--Danger); color: white; }
        .btn_doc { background: #2a2623; color: var(--Fame_gold); border: 1px solid var(--Fame_gold); }
        .btn:hover { opacity: 0.8; }

        #Login_Area { text-align: center; margin-top: 100px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            background: #2a2623; border: 1px solid var(--Fame_brown); 
            color: white; border-radius: 8px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="Login_Area">
        <h1 style="color: var(--Fame_gold);">🔐 Admin TNP MoB</h1>
        <input type="email" id="adm_email" placeholder="E-mail">
        <input type="password" id="adm_senha" placeholder="Senha">
        <button class="btn btn_aprovar" style="width: 100%;" onclick="logarAdmin()">ACESSAR PAINEL</button>
    </div>

    <div id="Admin_Dashboard" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: var(--Fame_gold); margin: 0;">Motoristas</h2>
            <button onclick="auth.signOut()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">Sair</button>
        </div>
        <div id="lista_motoristas">Buscando dados...</div>
    </div>
</div>

<script>
    // Configuração com a chave que você confirmou
    const firebaseConfig = {
        apiKey: "AIzaSyAN13M1GGwYmyQA4131HB23cGX1SLWmlsQ",
        authDomain: "tnp-mob.firebaseapp.com",
        projectId: "tnp-mob",
        storageBucket: "tnp-mob.firebasestorage.app",
        messagingSenderId: "775995955512",
        appId: "1:775995955512:web:07d865e4480e0bf33909cd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const ADMIN_UID = "OoRgSNe5gChgvFFJvL3m812NgC22"; // ID do Higo Valadares

    function logarAdmin() {
        const email = document.getElementById('adm_email').value;
        const senha = document.getElementById('adm_senha').value;
        auth.signInWithEmailAndPassword(email, senha).catch(e => alert("Erro: " + e.message));
    }

    auth.onAuthStateChanged(user => {
        const loginDiv = document.getElementById('Login_Area');
        const dashDiv = document.getElementById('Admin_Dashboard');
        
        if (user && user.uid === ADMIN_UID) {
            loginDiv.style.display = 'none';
            dashDiv.style.display = 'block';
            carregarMotoristas();
        } else {
            loginDiv.style.display = 'block';
            dashDiv.style.display = 'none';
        }
    });

    // 1. Função principal para carregar todos os cadastros
function carregarCadastros() {
    const listaDiv = document.getElementById('lista_motoristas');
    const colecoes = ["motoristas", "usuarios"];

    colecoes.forEach(colecao => {
        db.collection(colecao).onSnapshot(snapshot => {
            // Limpa apenas os cards da coleção atual para atualizar em tempo real
            document.querySelectorAll(`.card-${colecao}`).forEach(el => el.remove());

            snapshot.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                const ehMotorista = data.tipo === 'motorista';

                // Dados de Identidade
                const documento = data.identidade?.tipo === 'cpf' ? data.identidade?.cpf : data.identidade?.cnpj;
                const statusTxt = typeof data.status === 'string' ? data.status : (data.status?.geral || "pendente");
                const corStatus = statusTxt === 'aprovado' ? 'var(--Success)' : (statusTxt === 'recusado' ? 'var(--Danger)' : 'var(--Warning)');

                listaDiv.innerHTML += `
                    <div class="card_motorista card-${colecao}" style="border-left: 5px solid ${ehMotorista ? 'var(--Fame_brown)' : '#2a2623'}">
                        <div class="card_header">
                            <div>
                                <small style="color:var(--Fame_gold); font-size:0.7rem;">${colecao.toUpperCase()} | ${data.identidade?.tipo?.toUpperCase() || 'DOC'}</small>
                                <h3 style="margin:5px 0;">${data.nome || data.cnh?.nome || "Sem Nome"}</h3>
                            </div>
                            <span class="status_tag" style="background: ${corStatus}">${statusTxt}</span>
                        </div>

                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                            <div class="info_group"><span class="label">ID TNP:</span> ${data.idTnp || 'N/A'}</div>
                            <div class="info_group"><span class="label">Doc:</span> ${documento || 'N/A'}</div>
                            <div class="info_group"><span class="label">Zap:</span> ${data.telefonePrincipal || 'N/A'}</div>
                            <div class="info_group"><span class="label">Email:</span> <small>${data.email || 'N/A'}</small></div>
                        </div>

                        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                            <span class="label" style="display:block; margin-bottom:5px; font-size:0.7rem;">📍 ENDEREÇO</span>
                            <div class="info_group" style="font-size:0.8rem;">
                                ${data.endereco?.rua}, ${data.endereco?.numero} - ${data.endereco?.bairro}<br>
                                ${data.endereco?.cidade}/${data.endereco?.estado} - CEP: ${data.endereco?.cep}
                            </div>
                        </div>

                        ${ehMotorista ? `
                            <div style="border-top: 1px solid #333; padding-top: 15px;">
                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                    <div>
                                        <span class="label" style="font-size:0.7rem;">🚗 VEÍCULO</span>
                                        <div class="info_group">${data.veiculo?.modelo} (${data.veiculo?.ano})</div>
                                        <div class="info_group"><span class="label">Placa:</span> ${data.veiculo?.placa}</div>
                                        <div class="info_group"><span class="label">Cor:</span> ${data.veiculo?.cor}</div>
                                    </div>
                                    <div>
                                        <span class="label" style="font-size:0.7rem;">🪪 CNH (${data.cnh?.categoria})</span>
                                        <div class="info_group">${data.cnh?.numero}</div>
                                        <div class="info_group"><span class="label">Emissão:</span> ${data.cnh?.dataEmissao}</div>
                                    </div>
                                </div>
                            </div>
                        ` : ''}

                        <div class="btn_group">
                            <button class="btn btn_doc" onclick="verDocumentos('${id}', '${colecao}')">VER DOCS</button>
                            <button class="btn btn_aprovar" onclick="mudarStatus('${id}', 'aprovado', '${colecao}')">APROVAR</button>
                            <button class="btn btn_recusar" onclick="mudarStatus('${id}', 'recusado', '${colecao}')">RECUSAR</button>
                        </div>
                    </div>
                `;
            });
        });
    });
}

// 2. Ajuste na função de mudar status para aceitar a coleção
function mudarStatus(id, novo, colecao) {
    db.collection(colecao).doc(id).update({
        status: novo,
        "status.geral": novo,
        "status.atualizadoEm": new Date()
    }).catch(e => alert("Erro: " + e.message));
}

// 3. Lembre-se de atualizar a chamada dentro do onAuthStateChanged:
auth.onAuthStateChanged(user => {
    if (user && user.uid === ADMIN_UID) {
        document.getElementById('Login_Area').style.display = 'none';
        document.getElementById('Admin_Dashboard').style.display = 'block';
        carregarCadastros(); // Nome novo da função
    } else {
        document.getElementById('Login_Area').style.display = 'block';
        document.getElementById('Admin_Dashboard').style.display = 'none';
    }
});

    function mudarStatus(id, novo) {
        // Atualiza o campo de forma compatível com o novo cadastro
        db.collection("motoristas").doc(id).update({ 
            status: novo,
            "status.geral": novo, // Mantém compatibilidade com versões antigas do banco
            "status.atualizadoEm": new Date()
        }).catch(e => alert("Erro ao atualizar: " + e.message));
    }
</script>

</body>
</html>
