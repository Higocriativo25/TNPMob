<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - TNP MoB</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --Fame_dark: #121212;
            --Fame_card: #1e1b19;
            --Fame_gold: #c5a98d;
            --Fame_text: #e0e0e0;
            --Fame_brown: #4d2b1a;
            --Success: #28a745;
            --Danger: #dc3545;
            --Warning: #ffc107;
        }

        body {
            background-color: #000;
            color: var(--Fame_text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 600px; padding: 20px; }

        .card_motorista {
            background: var(--Fame_card);
            border: 1px solid var(--Fame_brown);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card_header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .status_tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: bold;
            color: #000;
        }

        .info_group { margin-bottom: 8px; font-size: 0.9rem; }
        .label { color: var(--Fame_gold); font-weight: bold; margin-right: 5px; }

        .btn_group { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn_aprovar { background: var(--Success); color: white; }
        .btn_recusar { background: var(--Danger); color: white; }
        .btn_doc { background: #2a2623; color: var(--Fame_gold); border: 1px solid var(--Fame_gold); }
        .btn:hover { opacity: 0.8; }

        #Login_Area { text-align: center; margin-top: 100px; }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            background: #2a2623; border: 1px solid var(--Fame_brown); 
            color: white; border-radius: 8px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="Login_Area">
        <h1 style="color: var(--Fame_gold);">🔐 Admin TNP MoB</h1>
        <input type="email" id="adm_email" placeholder="E-mail">
        <input type="password" id="adm_senha" placeholder="Senha">
        <button class="btn btn_aprovar" style="width: 100%;" onclick="logarAdmin()">ACESSAR PAINEL</button>
    </div>

    <div id="Admin_Dashboard" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: var(--Fame_gold); margin: 0;">Motoristas</h2>
            <button onclick="auth.signOut()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">Sair</button>
        </div>
        <div id="lista_motoristas">Buscando dados...</div>
    </div>
</div>

<script>
    // Configuração com a chave que você confirmou
    const firebaseConfig = {
        apiKey: "AIzaSyAN13M1GGwYmyQA4131HB23cGX1SLWmlsQ",
        authDomain: "tnp-mob.firebaseapp.com",
        projectId: "tnp-mob",
        storageBucket: "tnp-mob.firebasestorage.app",
        messagingSenderId: "775995955512",
        appId: "1:775995955512:web:07d865e4480e0bf33909cd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const ADMIN_UID = "OoRgSNe5gChgvFFJvL3m812NgC22"; // ID do Higo Valadares

    function logarAdmin() {
        const email = document.getElementById('adm_email').value;
        const senha = document.getElementById('adm_senha').value;
        auth.signInWithEmailAndPassword(email, senha).catch(e => alert("Erro: " + e.message));
    }

    auth.onAuthStateChanged(user => {
        const loginDiv = document.getElementById('Login_Area');
        const dashDiv = document.getElementById('Admin_Dashboard');
        
        if (user && user.uid === ADMIN_UID) {
            loginDiv.style.display = 'none';
            dashDiv.style.display = 'block';
            carregarMotoristas();
        } else {
            loginDiv.style.display = 'block';
            dashDiv.style.display = 'none';
        }
    });

    function carregarMotoristas() {
        const listaDiv = document.getElementById('lista_motoristas');

        db.collection("motoristas").onSnapshot(snapshot => {
            listaDiv.innerHTML = "";
            snapshot.forEach(doc => {
                const m = doc.data();
                const id = doc.id;

                // Mapeamento baseado no seu novo código de cadastro
                const nomeDisplay = m.cnh?.nome || m.nome || "Sem Nome";
                const whatsDisplay = m.whatsapp || m.telefonePrincipal || "Não informado";
                const veiculoDisplay = m.veiculo ? `${m.veiculo.modelo} (${m.veiculo.placa})` : "Dados ausentes";
                const tnpDisplay = m.idTNP || m.idTnp || "N/A";
                
                // Tratamento flexível para o campo status (string ou objeto)
                let statusTxt = "pendente";
                if (typeof m.status === 'string') {
                    statusTxt = m.status;
                } else if (m.status && m.status.geral) {
                    statusTxt = m.status.geral;
                }

                const corStatus = statusTxt === 'aprovado' ? 'var(--Success)' : (statusTxt === 'recusado' ? 'var(--Danger)' : 'var(--Warning)');

                listaDiv.innerHTML += `
                    <div class="card_motorista">
                        <div class="card_header">
                            <strong>${nomeDisplay}</strong>
                            <span class="status_tag" style="background: ${corStatus}">${statusTxt}</span>
                        </div>
                        <div class="info_group"><span class="label">ID TNP:</span> ${tnpDisplay}</div>
                        <div class="info_group"><span class="label">WhatsApp:</span> ${whatsDisplay}</div>
                        <div class="info_group"><span class="label">Veículo:</span> ${veiculoDisplay}</div>
                        <div class="info_group"><span class="label">E-mail:</span> ${m.email || 'N/A'}</div>
                        
                        <div class="btn_group">
                            <button class="btn btn_doc" onclick="alert('Uploads em desenvolvimento')">VER DOCS</button>
                            <button class="btn btn_aprovar" onclick="mudarStatus('${id}', 'aprovado')">APROVAR</button>
                            <button class="btn btn_recusar" onclick="mudarStatus('${id}', 'recusado')">RECUSAR</button>
                        </div>
                    </div>
                `;
            });
            if(snapshot.empty) listaDiv.innerHTML = "Nenhum motorista cadastrado.";
        });
    }

    function mudarStatus(id, novo) {
        // Atualiza o campo de forma compatível com o novo cadastro
        db.collection("motoristas").doc(id).update({ 
            status: novo,
            "status.geral": novo, // Mantém compatibilidade com versões antigas do banco
            "status.atualizadoEm": new Date()
        }).catch(e => alert("Erro ao atualizar: " + e.message));
    }
</script>

</body>
</html>
